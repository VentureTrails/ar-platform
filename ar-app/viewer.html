<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Content Viewer - Meta Quest</title>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #5568d3;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #contentList {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 300px;
            max-height: 400px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            z-index: 10;
        }
        .content-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .content-item:hover {
            background: rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>AR Content Viewer</div>
        <div id="status">Loading...</div>
    </div>
    <div id="contentList">
        <h3>Content Library</h3>
        <div id="items"></div>
    </div>
    <div id="controls">
        <button id="enterARBtn" disabled>Enter AR Mode</button>
        <button id="exitARBtn" style="display: none;">Exit AR</button>
    </div>

    <script>
        // Three.js setup
        let scene, camera, renderer;
        let contentMeshes = [];
        let session = null;
        let xrRefSpace = null;
        let controller1, controller2;
        let contentData = [];

        // Initialize Three.js
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType('local');
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.HemisphereLight(0xffffff, 0x444444);
            scene.add(light);

            // Load content from API
            loadContentFromAPI();

            // Start animation loop
            renderer.xr.addEventListener('sessionstart', onSessionStart);
            renderer.xr.addEventListener('sessionend', onSessionEnd);

            renderer.setAnimationLoop(render);

            window.addEventListener('resize', onWindowResize);
        }

        // Load content from backend API
        async function loadContentFromAPI() {
            try {
                const response = await fetch('/api/content', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                contentData = await response.json();
                displayContentList();
                updateStatus('Ready for AR');
                document.getElementById('enterARBtn').disabled = false;
            } catch (error) {
                updateStatus('Error loading content: ' + error.message);
            }
        }

        // Display content list in UI
        function displayContentList() {
            const itemsDiv = document.getElementById('items');
            itemsDiv.innerHTML = '';
            contentData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'content-item';
                div.textContent = item.title;
                div.onclick = () => addContentToScene(item);
                itemsDiv.appendChild(div);
            });
        }

        // Add content to AR scene
        function addContentToScene(content) {
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(content.imageUrl, (texture) => {
                const geometry = new THREE.PlaneGeometry(2, 2);
                const material = new THREE.MeshBasicMaterial({ map: texture });
                const mesh = new THREE.Mesh(geometry, material);

                // Apply AR metadata
                if (content.arMetadata) {
                    mesh.scale.set(content.arMetadata.scale, content.arMetadata.scale, 1);
                    mesh.rotation.z = content.arMetadata.rotation;
                    mesh.position.set(
                        content.arMetadata.position.x,
                        content.arMetadata.position.y,
                        content.arMetadata.position.z
                    );
                }

                scene.add(mesh);
                contentMeshes.push(mesh);
                updateStatus(`Added: ${content.title}`);
            });
        }

        // AR Mode handling
        async function enterARMode() {
            if (navigator.xr) {
                try {
                    session = await navigator.xr.requestSession('immersive-ar', {
                        requiredFeatures: ['hit-test'],
                        optionalFeatures: ['dom-overlay'],
                        domOverlay: { root: document.body }
                    });

                    xrRefSpace = await session.requestReferenceSpace('viewer');
                    document.getElementById('enterARBtn').style.display = 'none';
                    document.getElementById('exitARBtn').style.display = 'block';
                    updateStatus('AR Mode Active');
                } catch (e) {
                    updateStatus('AR not available: ' + e.message);
                }
            }
        }

        function exitARMode() {
            if (session) {
                session.end();
            }
        }

        function onSessionStart() {
            updateStatus('AR Session Started');
        }

        function onSessionEnd() {
            session = null;
            document.getElementById('enterARBtn').style.display = 'block';
            document.getElementById('exitARBtn').style.display = 'none';
            updateStatus('AR Session Ended');
        }

        function render(time, frame) {
            if (frame) {
                const session = frame.session;
                const pose = frame.getViewerPose(xrRefSpace);

                if (pose) {
                    for (const view of pose.views) {
                        const viewport = session.renderState.baseLayer.getViewport(view);
                        renderer.setViewport(viewport.x, viewport.y, viewport.width, viewport.height);

                        camera.projectionMatrix.fromArray(view.projectionMatrix);
                        camera.matrix.fromArray(view.transform.matrix);
                        camera.updateMatrixWorld(true);

                        renderer.render(scene, camera);
                    }
                }
            } else {
                renderer.render(scene, camera);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // Event listeners
        document.getElementById('enterARBtn').addEventListener('click', enterARMode);
        document.getElementById('exitARBtn').addEventListener('click', exitARMode);

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
